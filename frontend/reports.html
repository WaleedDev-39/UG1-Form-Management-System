<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reports – UG-1 Form Management System | UAF</title>
  <meta name="description" content="View and export UG-1 enrollment form reports."/>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="icon" href="./assets/uaf logo.png" type="image/png"/>
</head>
<body>
<div class="app-wrapper">
  <div id="sidebar-placeholder"></div>

  <div class="main-content">
    <header class="topbar">
      <div class="topbar-title"><h2>Reports</h2><p>View and export UG-1 form records</p></div>
      <div class="topbar-right">
        <button class="btn btn-gold" onclick="exportExcel()">
          📊 Export to Excel
        </button>
      </div>
    </header>

    <main class="page-content">

      <!-- Filters -->
      <div class="card" style="margin-bottom:20px;">
        <div class="filter-bar" style="margin-bottom:0;">
          <div class="form-group" style="margin-bottom:0;">
            <label style="font-size:0.78rem;font-weight:600;color:var(--text-muted);display:block;margin-bottom:4px;">Fee Status</label>
            <select id="filter-status" class="form-control" onchange="loadForms()">
              <option value="">All Statuses</option>
              <option value="Paid">Paid</option>
              <option value="Installment">Installment</option>
              <option value="Deferred">Deferred</option>
            </select>
          </div>
          <div class="form-group" style="margin-bottom:0;">
            <label style="font-size:0.78rem;font-weight:600;color:var(--text-muted);display:block;margin-bottom:4px;">From Date</label>
            <input id="filter-from" type="date" class="form-control" onchange="loadForms()"/>
          </div>
          <div class="form-group" style="margin-bottom:0;">
            <label style="font-size:0.78rem;font-weight:600;color:var(--text-muted);display:block;margin-bottom:4px;">To Date</label>
            <input id="filter-to" type="date" class="form-control" onchange="loadForms()"/>
          </div>
          <button class="btn btn-outline btn-sm" onclick="clearFilters()" style="margin-top:18px;">Clear</button>
          <span id="form-count" style="font-size:0.82rem;color:var(--text-muted);margin-top:20px;"></span>
        </div>
      </div>

      <!-- Table -->
      <div class="card" style="padding:0;overflow:hidden;">
        <div id="forms-loading" style="text-align:center;padding:40px;"><span class="spinner"></span></div>
        <div id="forms-content" style="display:none;">
          <div class="table-wrapper">
            <table>
              <thead>
                <tr>
                  <th>#</th>
                  <th>AG Number</th>
                  <th>Student Name</th>
                  <th>Father's Name</th>
                  <th>CNIC</th>
                  <th>Boarder</th>
                  <th>Sem.</th>
                  <th>Voucher ID</th>
                  <th>Fee Status</th>
                  <th>Submission Date</th>
                  <th>Processed By</th>
                  <th data-role="admin,staff">Actions</th>
                </tr>
              </thead>
              <tbody id="forms-tbody"></tbody>
            </table>
          </div>
          <div id="forms-empty" class="empty-state" style="display:none;">
            <div class="icon">📭</div>
            <p>No forms found for the selected filters.</p>
          </div>
        </div>
      </div>

    </main>
  </div>
</div>

<div id="toast-container"></div>
<script src="config.js"></script>
<script src="js/api.js"></script>
<script src="js/reports.js"></script>
</body>
</html>
